<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi CV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
        }
        .video-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }
        .contenido {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .foto-perfil {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 20px;
        }
        h1 { font-size: 36px; margin-bottom: 8px; }
        h2 { font-size: 20px; margin: 30px 0 10px; border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom: 6px; }
        p { font-size: 16px; line-height: 1.6; opacity: 0.9; }
    </style>
</head>
<body>

    <video class="video-fondo" autoplay muted loop>
        <source src="assets/video/PinDown.io_@mishkaaihan77_1774985331.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="contenido">
        <img class="foto-perfil" src="assets/img/Anya forger.jfif" alt="Mi foto">
        <h1>Bienvenido</h1>
        <p>Estudiante de programacion</p>
        <h2>Contacto</h2>
        <p>Email: ejemplo@gmail.com</p>
    </div>

</body>
</html>
