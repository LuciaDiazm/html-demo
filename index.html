<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patitas Felices</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .portada {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .video-fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .portada-texto {
            position: relative;
            z-index: 2;
            color: white;
            font-family: Arial, sans-serif;
        }

        .portada-texto h1 {
            font-size: 52px;
            font-family: Georgia, serif;
            margin-bottom: 12px;
        }

        .portada-texto p {
            font-size: 20px;
            opacity: 0.9;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fff5f8;
        }

        .graciosa {
            padding: 60px 20px;
            text-align: center;
            background: white;
        }

        .graciosa-inner {
            max-width: 700px;
            margin: 0 auto;
        }

        .graciosa h2 {
            font-size: 28px;
            color: #c2185b;
            margin-bottom: 16px;
        }

        .graciosa p {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }

        .graciosa img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <section class="portada">

        <!-- VIDEO DE FONDO -->
        <video class="video-fondo" autoplay muted loop>
            <source src="assets/video/video.mp4" type="video/mp4">
        </video>

        <!-- CAPA OSCURA -->
        <div class="overlay"></div>

        <!-- TEXTO ENCIMA -->
        <div class="portada-texto">
            <h1>Patitas Felices 🐱</h1>
            <p>Los mejores juguetes para tu gatito</p>
        </div>

    </section>

    <!-- SECCIÓN GRACIOSA -->
    <section class="graciosa">
        <div class="graciosa-inner">
            <h2>¿No sabés qué juguete comprarle a tu gato? 😹</h2>
            <p>Tranquilo/a, nosotros sí sabemos. Tu gato tampoco sabe lo que quiere... hasta que lo ve.</p>
            <img src="assets/Imagen/graciosa.jpg" alt="Gato gracioso">
        </div>
    </section>

</body>
</html>
